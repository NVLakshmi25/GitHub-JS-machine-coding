<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
}

.circle {
  position: absolute;
  border: 2px solid red;
  border-radius: 50%;
}

    </style>
</head>
<body>
    <script>
        // Store maximum 2 circles
let circles = [];

// Utility function: generate random number between min & max
function getRandom(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// Distance formula (from mathematics)
function isIntersecting(c1, c2) {
  const dx = c1.x - c2.x;
  const dy = c1.y - c2.y;

  // Distance between centers using Pythagoras theorem
  const distance = Math.sqrt(dx * dx + dy * dy);

  // If distance < sum of radii => intersecting
  return distance < (c1.radius + c2.radius);
}

// Click event
document.addEventListener("click", (e) => {

  // If already 2 circles → remove both
  if (circles.length === 2) {
    document.querySelectorAll(".circle").forEach(c => c.remove());
    circles = [];
  }

  const radius = getRandom(10, 100);

  const circle = document.createElement("div");
  circle.classList.add("circle");

  circle.style.width = radius * 2 + "px";
  circle.style.height = radius * 2 + "px";

  // Centering circle at click point
  circle.style.left = (e.clientX - radius) + "px";
  circle.style.top = (e.clientY - radius) + "px";

  document.body.appendChild(circle);

  // Save circle data
  circles.push({
    x: e.clientX,
    y: e.clientY,
    radius
  });

  // If 2 circles exist → check intersection
  if (circles.length === 2) {
    const result = isIntersecting(circles[0], circles[1]);
    console.log("Intersecting:", result);
  }
});

    </script>
</body>
</html>
